<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heading Styles Exercise</title>
    <style>
        /* 網頁背景設為淡灰色，以凸顯白色的題目卡片 */
        body {
            background-color: #eef0f4;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        /* 模擬題目圖片中帶有陰影的白色卡片 */
        .card {
            background-color: white;
            width: 400px; /* 控制卡片寬度，讓 H2 的框線與 H3 對齊感更明顯 */
            padding: 30px;
            box-shadow: 2px 4px 12px rgba(0, 0, 0, 0.3); /* 陰影效果 */
            font-family: "Times New Roman", Times, serif; /* 統一使用襯線字體 */
        }

        /* 第一個標題：上頂線 + 粗體 + 粉紅陰影 */
        h1 {
            text-decoration: overline;
            text-decoration-thickness: 2px;
            text-shadow: 2px 2px 3px rgba(255, 105, 180, 0.6);
            font-size: 26px;
            margin-top: 0;
            margin-bottom: 25px;
        }

        /* 第二個標題：斜體 + 長方形黃色外框 */
        h2 {
            font-style: italic;
            border: 2px solid #baba00; /* 橄欖黃色外框 */
            padding: 5px 8px; /* 框線內的留白 */
            font-size: 20px;
            margin-bottom: 35px;
            /* h2 預設是 block，會自動填滿卡片寬度，形成題目中的長方形 */
        }

        /* 第三個標題：靠右 + 底線 */
        h3 {
            text-align: right;
            text-decoration: underline;
            font-size: 16px;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>This is heading 1</h1>
        <h2>This is heading 2</h2>
        <h3>This is heading 3</h3>
    </div>

</body>
</html>
