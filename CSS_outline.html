<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heading Styles Assignment</title>
    <style>
        /* Container to mimic the white box in the image */
        .container {
            width: 500px;
            padding: 20px;
            font-family: "Times New Roman", Times, serif;
        }

        /* Heading 1: Left aligned, thick black overline/underline effect */
        h1 {
            display: inline-block;
            border-top: 3px solid black;
            border-bottom: 3px solid black;
            margin-bottom: 20px;
            font-size: 2em;
        }

        /* Heading 2: Italic, boxed with a yellow highlight/border */
        h2 {
            border: 2px solid #808000; /* Darker yellow/olive border */
            background-color: #FFFFE0; /* Light yellow background */
            font-style: italic;
            padding: 5px;
            font-weight: bold;
            font-size: 1.5em;
        }

        /* Heading 3: Right aligned and underlined */
        h3 {
            text-align: right;
            text-decoration: underline;
            font-size: 1.17em;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>This is heading 1</h1>
        
        <h2>This is heading 2</h2>
        
        <h3>This is heading 3</h3>
    </div>

</body>
</html>
