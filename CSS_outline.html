<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heading Styles Exercise</title>
    <style>
        
        .container {
            width: 450px; 
            margin: 40px auto; 
            padding: 20px 30px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); 
            font-family: "Times New Roman", Times, serif; 
        }

        
        h1, h2, h3 {
            margin-top: 15px;
            margin-bottom: 25px;
        }

        
        .heading-1 {
            text-decoration: overline;
            text-decoration-thickness: 2px;
            text-shadow: 2px 2px 2px rgba(255, 105, 180, 0.6); 
            font-size: 28px;
        }

 
        .heading-2 {
            font-style: italic;
            border: 2px solid 
            padding: 2px 8px; 
            display: inline-block; 
            font-size: 22px;
        }

        .heading-3 {
            text-align: right;
            text-decoration: underline;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
      
        body {
            background-color: #f4f5f7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="heading-1">This is heading 1</h1>
        <h2 class="heading-2">This is heading 2</h2>
        <h3 class="heading-3">This is heading 3</h3>
    </div>

</body>
</html>
