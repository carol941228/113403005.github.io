<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        /* 外部總寬度控制：20 (左) + 496 (內容) + 26 (右) = 542px */
        .outer-wrapper {
            width: 542px;
            border: 1px solid #e0e0e0;
            box-sizing: border-box;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* 上方灰色 Header */
        .header-bar {
            width: 100%;
            height: 35px;
            background-color: #f6f6f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 18px 0 15px; 
            box-sizing: border-box;
            border-bottom: 1px solid #e0e0e0;
        }

        .label-preview {
            font-size: 13px;
            color: #707070;
        }

        #actionButton {
            height: 22px;
            padding: 0 12px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            font-size: 13px;
            color: #2f2f2f;
            cursor: pointer;
        }

        /* 滾動容器：強制顯示右側捲軸軌道 */
        .scroll-container {
            width: 100%;
            height: 250px; /* 預設高度稍微大於圖片，保持穩定 */
            overflow-y: scroll; /* 強制開啟右側捲軸軌道 */
            overflow-x: hidden;
            transition: height 0.3s ease;
        }

        /* 當點擊展開時，增加高度 */
        .scroll-container.expanded {
            height: 450px; 
        }

        /* 核心內容佈局區 (控制左 20, 右 26 邊距) */
        .content-layout {
            padding-left: 20px;
            padding-right: 26px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 圖片區域：496px 橘色背景 */
        .image-section {
            width: 496px;
            height: 240px;
            background-color: #ffdab9; 
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            margin-top: 10px;
        }

        .main-image {
            width: 450px; /* 圖片實體寬度 */
            height: 240px;
            object-fit: cover;
            display: block;
        }

        /* 資訊面板：與橘色框 (496px) 對齊 */
        .info-panel {
            width: 496px;
            padding: 10px 0 20px 0;
            box-sizing: border-box;
            display: none; /* 預設隱藏文字 */
        }

        .info-row {
            font-size: 12px;
            color: #2f2f2f;
            margin-bottom: 2px;
            background-color: #99ff99; /* 綠色背景 */
            padding: 4px 8px;
            display: flex;
            box-sizing: border-box;
            width: 100%;
        }

        .info-label {
            font-weight: bold;
            min-width: 70px;
        }

        /* 自定義捲軸樣式，確保它清晰可見 */
        .scroll-container::-webkit-scrollbar {
            width: 10px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 5px;
        }
        .scroll-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>

<div class="outer-wrapper">
    <div class="header-bar">
        <div class="label-preview">預覽</div>
        <button id="actionButton">查看資訊</button>
    </div>

    <div class="scroll-container" id="scrollWrapper">
        <div class="content-layout">
            <div class="image-section">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=450&q=80" alt="Preview" class="main-image">
            </div>
            
            <div class="info-panel" id="infoPanel">
                <div class="info-row"><span class="info-label">修改日期:</span> 2017/10/12</div>
                <div class="info-row"><span class="info-label">類型:</span> JPG</div>
                <div class="info-row"><span class="info-label">大小:</span> 466.97KB</div>
                <div class="info-row"><span class="info-label">路徑:</span> \\designcenter.qnap.com.tw\DesignCenter\PM - RD 協作\WEB\Stations\A_Image2PDFxZsample</div>
            </div>
        </div>
    </div>
</div>

<script>
    const btn = document.getElementById('actionButton');
    const wrapper = document.getElementById('scrollWrapper');
    const info = document.getElementById('infoPanel');

    btn.addEventListener('click', function() {
        wrapper.classList.toggle('expanded');
        
        if (wrapper.classList.contains('expanded')) {
            info.style.display = 'block';
            btn.textContent = '收起資訊';
            // 自動向下捲動一點，讓使用者知道下面有東西
            setTimeout(() => {
                wrapper.scrollTo({ top: 100, behavior: 'smooth' });
            }, 100);
        } else {
            info.style.display = 'none';
            btn.textContent = '查看資訊';
            wrapper.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });
</script>

</body>
</html>
