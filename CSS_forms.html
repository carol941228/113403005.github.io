<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', "Noto Sans TC", sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        /* 主容器：固定寬度以符合設計稿 496px 圖片寬度 */
        .main-container {
            width: 496px;
            position: relative;
        }

        /* 上方標題與按鈕列 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 5px;
            height: 35px;
        }

        .label-preview {
            font-size: 13px;
            color: #707070;
            padding-left: 2px;
        }

        /* 依照設計稿標註實作的按鈕 */
        #actionButton {
            height: 22px;
            padding: 0 12px;
            border-radius: 8px; /* R8 */
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: #2f2f2f;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        #actionButton:hover {
            background-color: #f0f0f0;
        }

        /* 內容容器：包含圖片與資訊，並設定捲軸 */
        .scroll-container {
            width: 100%;
            height: 240px; /* 初始高度與圖片一致 */
            border: 1px solid #e0e0e0;
            overflow-y: hidden; /* 預設不捲動 */
            transition: height 0.3s ease;
        }

        /* 當展開時，容器高度固定並開啟捲軸 */
        .scroll-container.expanded {
            height: 400px; 
            overflow-y: scroll;
        }

        /* 圖片樣式 */
        .main-image {
            width: 496px;
            height: 240px;
            display: block;
            object-fit: cover;
        }

        /* 資訊區塊 */
        .info-panel {
            padding: 15px 20px;
            background-color: #ffffff;
        }

        .info-row {
            font-size: 13px;
            color: #2f2f2f;
            margin-bottom: 6px;
            display: flex;
        }

        .info-label {
            font-weight: bold;
            min-width: 80px;
        }

        .info-value {
            color: #2f2f2f;
            word-break: break-all;
        }

        /* 綠色高亮效果（模擬設計圖標註） */
        .highlight {
            background-color: #99ff99;
        }

        /* 自定義捲軸樣式 */
        .scroll-container::-webkit-scrollbar {
            width: 6px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background-color: #ccc;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="top-bar">
        <div class="label-preview">預覽</div>
        <button id="actionButton">查看資訊</button>
    </div>

    <div class="scroll-container" id="contentWrapper">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=496&q=80" alt="Preview" class="main-image">
        
        <div class="info-panel">
            <div class="info-row highlight">
                <span class="info-label">修改日期:</span>
                <span class="info-value">2017/10/12</span>
            </div>
            <div class="info-row highlight">
                <span class="info-label">類型:</span>
                <span class="info-value">JPG</span>
            </div>
            <div class="info-row highlight">
                <span class="info-label">大小:</span>
                <span class="info-value">466.97KB</span>
            </div>
            <div class="info-row highlight">
                <span class="info-label">路徑:</span>
                <span class="info-value">\\designcenter.qnap.com.tw\DesignCenter\PM - RD 協作\WEB\Stations\A_Image2PDFxZsample</span>
            </div>
        </div>
    </div>
</div>

<script>
    const btn = document.getElementById('actionButton');
    const wrapper = document.getElementById('contentWrapper');

    btn.addEventListener('click', function() {
        wrapper.classList.toggle('expanded');
        
        if (wrapper.classList.contains('expanded')) {
            btn.textContent = '收起資訊';
            // 自動滾動到資訊區
            setTimeout(() => {
                wrapper.scrollTo({ top: 240, behavior: 'smooth' });
            }, 100);
        } else {
            btn.textContent = '查看資訊';
            wrapper.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });
</script>

</body>
</html>
