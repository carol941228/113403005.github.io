<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precise Layout Alignment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        /* 外部總寬度：496 + 20 + 26 = 542px */
        .outer-wrapper {
            width: 542px;
            border: 1px solid #e0e0e0;
            box-sizing: border-box;
            background-color: #ffffff;
        }

        /* 上方灰色 Header */
        .header-bar {
            width: 100%;
            height: 35px;
            background-color: #f6f6f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 18px 0 15px; 
            box-sizing: border-box;
            border-bottom: 1px solid #e0e0e0;
        }

        .label-preview {
            font-size: 13px;
            color: #707070;
        }

        /* 按鈕樣式 */
        #actionButton {
            height: 22px;
            padding: 0 12px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            font-size: 13px;
            color: #2f2f2f;
            cursor: pointer;
            outline: none;
        }

        /* 內容滾動區 */
        .scroll-container {
            width: 100%;
            height: 240px; /* 初始設為圖片高度 */
            overflow-y: hidden;
            overflow-x: hidden;
            transition: height 0.3s ease;
        }

        .scroll-container.expanded {
            height: 400px; /* 展開後高度 */
            overflow-y: scroll;
        }

        /* 核心內容佈局區 (控制左右 20, 26 邊距) */
        .content-layout {
            padding-left: 20px;
            padding-right: 26px;
            width: 100%;
            box-sizing: border-box;
        }

        /* 圖片區域：寬度 496px */
        .image-section {
            width: 496px;
            height: 240px;
            background-color: #ffdab9; /* 橘色留白區 */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 0;
        }

        .main-image {
            width: 450px; /* 圖片內容 450 */
            height: 240px;
            object-fit: cover;
            display: block;
        }

        /* 資訊面板：與圖片區域寬度 (496px) 完全對齊 */
        .info-panel {
            width: 496px;
            padding: 10px 0;
            box-sizing: border-box;
            /* 預設隱藏，點擊按鈕後由 JS 控制 */
            display: none;
        }

        .info-row {
            font-size: 13px;
            color: #2f2f2f;
            margin-bottom: 2px;
            background-color: #99ff99; /* 綠色背景與橘色框對齊 */
            padding: 4px 8px;
            display: flex;
            box-sizing: border-box;
        }

        .info-label {
            font-weight: bold;
            min-width: 80px;
        }

        /* 自定義捲軸 */
        .scroll-container::-webkit-scrollbar {
            width: 8px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #cccccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="outer-wrapper">
    <div class="header-bar">
        <div class="label-preview">預覽</div>
        <button id="actionButton">查看資訊</button>
    </div>

    <div class="scroll-container" id="scrollWrapper">
        <div class="content-layout">
            <div class="image-section">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=450&q=80" alt="Preview" class="main-image">
            </div>
            
            <div class="info-panel" id="infoPanel">
                <div class="info-row"><span class="info-label">修改日期:</span> 2017/10/12</div>
                <div class="info-row"><span class="info-label">類型:</span> JPG</div>
                <div class="info-row"><span class="info-label">大小:</span> 466.97KB</div>
                <div class="info-row"><span class="info-label">路徑:</span> \\designcenter.qnap.com.tw\DesignCenter\PM - RD 協作\WEB\Stations\A_Image2PDFxZsample</div>
            </div>
        </div>
    </div>
</div>

<script>
    const btn = document.getElementById('actionButton');
    const wrapper = document.getElementById('scrollWrapper');
    const info = document.getElementById('infoPanel');

    btn.addEventListener('click', function() {
        wrapper.classList.toggle('expanded');
        
        if (wrapper.classList.contains('expanded')) {
            info.style.display = 'block';
            btn.textContent = '收起資訊';
            // 平滑滾動至資訊區
            setTimeout(() => {
                wrapper.scrollTo({ top: 50, behavior: 'smooth' });
            }, 100);
        } else {
            // 延遲隱藏文字以維持動畫流暢，或直接隱藏
            info.style.display = 'none';
            btn.textContent = '查看資訊';
            wrapper.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });
</script>

</body>
</html>
