<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precise Image Detail Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
        }

        /* 外部容器：依照 496 寬度 + 左右 padding (20, 26) */
        .outer-wrapper {
            width: calc(496px + 20px + 26px); 
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* 2. 圖片上方空間必須是灰色 (header bg color #f6f6f6) */
        .header-bar {
            width: 100%;
            height: 35px; /* 設計稿標註高度 35 */
            background-color: #f6f6f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            /* 左右間距：左邊距 5, 右邊距 18 */
            padding-left: 5px;
            padding-right: 18px;
        }

        .label-preview {
            font-size: 13px;
            color: #707070;
            margin-left: 10px; /* 依照標註微調 */
        }

        /* 按鈕精確樣式：h22, R8, outline 1px #2f2f2f */
        #actionButton {
            height: 22px;
            padding: 0 15px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            font-size: 13px;
            color: #2f2f2f;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 內容容器：包含左右間距 (左20, 右26) 與下方的資訊 */
        .content-container {
            width: 100%;
            height: 300px; /* 設定固定高度觸發捲軸 */
            border: 1px solid #e0e0e0;
            border-top: none;
            background-color: #fff;
            
            /* 3. 卷軸在右邊 (overflow-y) */
            overflow-y: scroll; 
            overflow-x: hidden;
            box-sizing: border-box;
        }

        /* 圖片區域：寬度 496，左右各有間距 */
        .image-wrapper {
            padding-left: 20px; /* 圈選數字：左 20 */
            padding-right: 26px; /* 圈選數字：右 26 */
            padding-top: 10px;
            width: 496px; /* 圈選數字：圖片寬 496 */
        }

        .main-image {
            width: 496px;
            height: 240px;
            display: block;
            object-fit: cover;
        }

        /* 資訊面板 */
        .info-panel {
            padding: 20px;
            padding-left: 20px; /* 保持與圖片左側對齊 */
        }

        .info-row {
            font-size: 13px;
            margin-bottom: 8px;
            background-color: #99ff99; /* 模擬圖中綠色高亮 */
            padding: 2px 5px;
        }

        .info-label {
            font-weight: bold;
            display: inline-block;
            width: 80px;
        }

        /* 捲軸樣式調整 (讓它更像設計稿) */
        .content-container::-webkit-scrollbar {
            width: 10px;
        }
        .content-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .content-container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="outer-wrapper">
    <div class="header-bar">
        <div class="label-preview">預覽</div>
        <button id="actionButton">收起資訊</button>
    </div>

    <div class="content-container">
        <div class="image-wrapper">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=496&q=80" alt="Landscape" class="main-image">
        </div>
        
        <div class="info-panel">
            <div class="info-row"><span class="info-label">修改日期:</span> 2017/10/12</div>
            <div class="info-row"><span class="info-label">類型:</span> JPG</div>
            <div class="info-row"><span class="info-label">大小:</span> 466.97KB</div>
            <div class="info-row"><span class="info-label">路徑:</span> \\designcenter.qnap.com.tw\DesignCenter\PM - RD 協作\WEB\Stations\A_Image2PDFxZsample</div>
        </div>
    </div>
</div>

<script>
    const btn = document.getElementById('actionButton');
    const container = document.querySelector('.content-container');

    btn.addEventListener('click', function() {
        if (container.style.overflowY === 'hidden') {
            container.style.overflowY = 'scroll';
            btn.textContent = '收起資訊';
        } else {
            container.style.overflowY = 'hidden';
            container.scrollTop = 0;
            btn.textContent = '查看資訊';
        }
    });
</script>

</body>
</html>
