<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precise Design Implementation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        /* 外部容器：寬度 496 + 左 20 + 右 26 */
        .outer-wrapper {
            width: 542px; /* 496 + 20 + 26 */
            border: 1px solid #e0e0e0;
            box-sizing: border-box;
        }

        /* 上方灰色空間 */
        .header-bar {
            width: 100%;
            height: 35px;
            background-color: #f6f6f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 18px 0 15px; /* 右邊距 18 */
            box-sizing: border-box;
            border-bottom: 1px solid #e0e0e0;
        }

        .label-preview {
            font-size: 13px;
            color: #707070;
        }

        /* 查看資訊按鈕 */
        #actionButton {
            height: 22px;
            padding: 0 12px;
            border-radius: 8px; /* R8 */
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            font-size: 13px;
            color: #2f2f2f;
            cursor: pointer;
        }

        /* 捲軸內容區 */
        .content-container {
            width: 100%;
            height: 350px;
            overflow-y: scroll;
            overflow-x: hidden;
            background-color: #ffffff;
        }

        /* 圖片容器區塊 (496px) */
        .image-section {
            margin-left: 20px;  /* 左邊距 20 */
            margin-right: 26px; /* 右邊距 26 */
            width: 496px;
            height: 240px;
            background-color: #ffdab9; /* 模擬紅圈處的橘色留白區 */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }

        /* 實體圖片 (450x240) */
        .main-image {
            width: 450px; /* 紅圈標註：450x240 */
            height: 240px;
            object-fit: cover;
            display: block;
        }

        /* 資訊面板 */
        .info-panel {
            margin-left: 20px;
            margin-right: 26px;
            padding: 20px 0;
        }

        .info-row {
            font-size: 13px;
            color: #2f2f2f;
            margin-bottom: 4px;
            background-color: #ccffcc; /* 綠色高亮 */
            padding: 4px 8px;
            display: flex;
        }

        .info-label {
            font-weight: bold;
            min-width: 80px;
        }

        /* 自定義捲軸 */
        .content-container::-webkit-scrollbar {
            width: 8px;
        }
        .content-container::-webkit-scrollbar-thumb {
            background: #cccccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="outer-wrapper">
    <div class="header-bar">
        <div class="label-preview">預覽</div>
        <button id="actionButton">收起資訊</button>
    </div>

    <div class="content-container">
        <div class="image-section">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=450&q=80" alt="Landscape" class="main-image">
        </div>
        
        <div class="info-panel">
            <div class="info-row"><span class="info-label">修改日期:</span> 2017/10/12</div>
            <div class="info-row"><span class="info-label">類型:</span> JPG</div>
            <div class="info-row"><span class="info-label">大小:</span> 466.97KB</div>
            <div class="info-row"><span class="info-label">路徑:</span> \\designcenter.qnap.com.tw\DesignCenter\PM - RD 協作\WEB\Stations\A_Image2PDFxZsample</div>
        </div>
    </div>
</div>

<script>
    const btn = document.getElementById('actionButton');
    const container = document.querySelector('.content-container');

    btn.addEventListener('click', function() {
        if (container.style.display === 'none') {
            container.style.display = 'block';
            btn.textContent = '收起資訊';
        } else {
            container.style.display = 'none';
            btn.textContent = '查看資訊';
        }
    });
</script>

</body>
</html>
