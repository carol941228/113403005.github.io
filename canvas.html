<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <style>
      .canvas{
        position: relative;
        width: 500px;
        height: 400px;
        margin: 50px;
      }
      .rectangle{
        position: absolute;
        top: 50px;
        left: 20px;
        width: 250px;
        height: 180px;
        background-color: blue;
        border: 4px solid black;
        z-index: 1;
      }
      .circle{
        position: absolute;
        top: 80px;
        left: 180px;
        width: 160px;
        height: 160px;
        background-color: yellow;
        border: 4px solid red;
        border-radius: 50%;
        z-index: 2;
    </style>
  </head>
  <body>
    <div class="canvas">
      <div class="rectangle"></div>
      <div class="circle"></div>
    </div>
  </body>
</html>
