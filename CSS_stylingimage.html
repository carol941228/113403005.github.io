<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: flex_start;
            align-items: flex_start;
            padding:0;
        }

        /* 左邊：width 33%, radius 18px, no distortion */
        .img-left {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover; /* 關鍵：不變形 */
            display: block;
        }

        /* 中間：正圓形 150px */
        .img-center {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* 變成圓形 */
            border: 1px solid #000;
            object-fit: cover;
            display: block;
        }

        /* 右邊：width 33%, height 300px, distortion */
        .img-right {
            width: 33%;
            height: 300px;
            object-fit: fill; /* 關鍵：強制拉伸會導致變形 */
            display: block;
        }
    </style>
</head>
<body>

    <img src="tower.jpg" class="img-left">

    <img src="middle.jpg" class="img-center">

    <img src="tower.jpg" class="img-right">

</body>
</html>
